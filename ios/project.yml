name: DayLab
options:
  bundleIdPrefix: me.daylab
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

settings:
  base:
    PRODUCT_NAME: "Day Lab"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    ENABLE_BITCODE: NO
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  DayLab:
    type: application
    platform: iOS
    sources:
      - Sources/DayLab
    resources:
      - Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.daylab.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Sources/DayLab/Info.plist
        DEVELOPMENT_TEAM: AZ65YJVYKM
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
    info:
      path: Sources/DayLab/Info.plist
      properties:
        CFBundleIconName: AppIcon
        CFBundleDisplayName: Day Lab
        CFBundleName: Day Lab
        CFBundleIdentifier: me.daylab.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        CFBundlePackageType: APPL
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIViewControllerBasedStatusBarAppearance: false
        UIUserInterfaceStyle: Dark
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleURLTypes:
          - CFBundleURLName: me.daylab.app
            CFBundleURLSchemes:
              - daylab
