name: DayLab
options:
  bundleIdPrefix: me.daylab
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

settings:
  base:
    PRODUCT_NAME: "Day Lab"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    ENABLE_BITCODE: NO
    TARGETED_DEVICE_FAMILY: "1,2"  # iPhone + iPad

targets:
  DayLoop:
    type: application
    platform: iOS
    sources:
      - Sources/DayLab
    resources:
      - Assets.xcassets
    settings:
      base:
        INFOPLIST_FILE: Sources/DayLab/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: me.daylab.app
